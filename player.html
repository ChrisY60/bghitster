<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>&#127925;</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      user-select: none;
      gap: 0;
    }

    #logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: #1db954;
      margin-bottom: 2.5rem;
    }

    /* Vinyl disc */
    #disc-wrap {
      position: relative;
      width: 190px;
      height: 190px;
      margin-bottom: 2.5rem;
    }

    #disc {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #222 0%, #111 55%, #1a1a1a 56%, #111 60%),
        conic-gradient(from 0deg, #1a1a1a 0deg, #2a2a2a 10deg, #1a1a1a 20deg, #2a2a2a 30deg, #1a1a1a 40deg, #2a2a2a 50deg, #1a1a1a 60deg, #2a2a2a 70deg, #1a1a1a 80deg, #2a2a2a 90deg, #1a1a1a 100deg, #2a2a2a 110deg, #1a1a1a 120deg, #2a2a2a 130deg, #1a1a1a 140deg, #2a2a2a 150deg, #1a1a1a 160deg, #2a2a2a 170deg, #1a1a1a 180deg, #2a2a2a 190deg, #1a1a1a 200deg, #2a2a2a 210deg, #1a1a1a 220deg, #2a2a2a 230deg, #1a1a1a 240deg, #2a2a2a 250deg, #1a1a1a 260deg, #2a2a2a 270deg, #1a1a1a 280deg, #2a2a2a 290deg, #1a1a1a 300deg, #2a2a2a 310deg, #1a1a1a 320deg, #2a2a2a 330deg, #1a1a1a 340deg, #2a2a2a 350deg, #1a1a1a 360deg);
      box-shadow: 0 0 0 2px #2a2a2a, 0 0 50px rgba(29,185,84,0.3);
    }

    #disc.spinning {
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #disc-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1db954;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #disc-center::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #0d0d0d;
    }

    /* Controls */
    #controls {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    #play-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      background: #1db954;
      color: #000;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      padding-left: 4px; /* optical centre for play icon */
    }

    #play-btn:hover  { background: #1ed760; }
    #play-btn:active { transform: scale(0.93); }
    #play-btn.paused { padding-left: 0; }

    #status {
      font-size: 0.85rem;
      color: #666;
      min-height: 1.3em;
      margin-bottom: 2rem;
    }

    /* Next song button */
    #next-btn {
      background: transparent;
      border: 2px solid #1db954;
      border-radius: 50px;
      color: #1db954;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.7rem 2rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }

    #next-btn:hover  { background: #1db954; color: #000; }
    #next-btn:active { transform: scale(0.96); }

    /* Hidden YouTube iframe — audio plays but nothing is visible */
    #yt-frame {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="logo">&#127926; ХИТСТЕР БГ</div>

  <div id="disc-wrap">
    <div id="disc"></div>
    <div id="disc-center"></div>
  </div>

  <div id="controls">
    <button id="play-btn" onclick="togglePlay()">&#9654;</button>
  </div>

  <div id="status">Зарежда…</div>

  <button id="next-btn" onclick="nextSong()">&#10145; Следваща песен</button>

  <div id="yt-frame"></div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const videoId = params.get('v');

    const disc    = document.getElementById('disc');
    const playBtn = document.getElementById('play-btn');
    const status  = document.getElementById('status');

    let player  = null;
    let playing = false;

    function setPlaying(val) {
      playing = val;
      if (val) {
        disc.classList.add('spinning');
        playBtn.innerHTML = '&#9646;&#9646;';
        playBtn.classList.remove('paused');
        status.textContent = 'Свири…';
      } else {
        disc.classList.remove('spinning');
        playBtn.innerHTML = '&#9654;';
        playBtn.classList.add('paused');
      }
    }

    function onYTReady() {
      if (!videoId) {
        status.textContent = 'Грешка: липсва ?v= в URL-а';
        playBtn.disabled = true;
        return;
      }

      player = new YT.Player('yt-frame', {
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          rel: 0,
          playsinline: 1,
        },
        events: {
          onReady:       (e) => { e.target.playVideo(); status.textContent = 'Зарежда…'; },
          onStateChange: onStateChange,
          onError:       ()  => { status.textContent = 'Грешка при зареждане.'; },
        },
      });
    }

    function onStateChange(e) {
      switch (e.data) {
        case YT.PlayerState.PLAYING:
          setPlaying(true);
          break;
        case YT.PlayerState.PAUSED:
          setPlaying(false);
          status.textContent = 'Пауза';
          break;
        case YT.PlayerState.ENDED:
          setPlaying(false);
          status.textContent = 'Края на песента';
          break;
      }
    }

    function togglePlay() {
      if (!player) return;
      if (playing) { player.pauseVideo(); }
      else         { player.playVideo();  }
    }

    function nextSong() {
      // Stop playback, go back to the scanner
      if (player) player.stopVideo();
      window.location.href = 'index.html';
    }

    window.onYouTubeIframeAPIReady = onYTReady;
  </script>

  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
